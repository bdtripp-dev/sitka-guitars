version: "3.9"

services:
  wordpress:
    build: .
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}

      VIRTUAL_HOST: ${DOMAIN}

    volumes:
      - wp-content:/var/www/html/wp-content

    networks:
      - sitka_net
      - public_net

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - sitka_net

volumes:
  wp-content:
  db-data:

networks:
  sitka-net:
    driver: bridge

    public_net:
      name: ${ENV_NAME}_public
      external: true