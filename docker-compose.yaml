services:
  wordpress:
    image: wordpress:php8.2-apache
    restart: always
    labels:
      - "deunhealth.restart=true"
    depends_on:
      - db
    environment:
      - WORDPRESS_DB_HOST=${PROJECT_NAME}-db-1:3306
      - WORDPRESS_DB_NAME=${DB_NAME}
      - WORDPRESS_DB_USER=${DB_USER}
      - WORDPRESS_DB_PASSWORD=${DB_PASSWORD}
      - VIRTUAL_HOST=${FQDN}
      - WORDPRESS_SKIP_CHOWN=1
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./wp:/var/www/html
    user: "www-data"
    networks:
      - sitka_net
      - public_net
  db:
    image: mysql:8.4
    restart: always
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD_FILE=/run/secrets/db_password
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db_root_password
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - sitka_net
    secrets:
      - db_password
      - db_root_password
volumes:
  wp-content:
  db-data:
networks:
  sitka_net:
    driver: bridge
  public_net:
    name: ${ENV_NAME}_public
    external: true
secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_root_password:
    file: ./secrets/db_root_password.txt
